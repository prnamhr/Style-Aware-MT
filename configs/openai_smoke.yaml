# Smoke-test configuration for the OpenAI-backed AFSP / reference pipeline.
#
# This is a prototype harness: it validates the retrieval -> prompt -> generation
# -> output -> scoring loop against a commercial API before the open-source
# 7-8B local pipeline is built. The generator is model-swappable; nothing here
# is specific to OpenAI beyond the client wrapper.

# --- Generation (OpenAI chat completions) ---
# gpt-5.5 is a reasoning model: it rejects a custom temperature and bills hidden
# reasoning tokens as output, so temperature/seed are omitted and max_tokens is
# raised to leave room for reasoning + the visible translation. For a cheap
# non-reasoning run, set model: gpt-4o-mini, temperature: 0.0, max_tokens: 1024,
# and drop reasoning_effort.
generator:
  provider: openai
  model: gpt-5.5
  max_tokens: 4096          # covers reasoning tokens + output (counts toward this cap)
  reasoning_effort: low     # translation isn't reasoning-heavy; raise for harder tasks

# --- Prompting ---
prompt:
  style_instruction_file: prompts/style_instruction.txt

# --- AFSP retrieval ---
afsp:
  embed_model: intfloat/multilingual-e5-large-instruct
  index_dir: data/afsp_index            # built by `build_index`
  train_file: data/splits/train.jsonl   # exemplar pool (English target side)
  k: 4                                   # shots; sweep {2,4,8} on dev later

# --- Data ---
data:
  test_file: data/splits/test.jsonl
  limit: 25                # smoke slice; null = full test set

# --- Output ---
output:
  dir: outputs
