# ============================================================================
# SMOKE TEST ONLY -- NOT A THESIS CONDITION, NOT A SOURCE OF FINDINGS.
# ----------------------------------------------------------------------------
# Mirrors configs/openai_smoke.yaml; only the generator block differs. The same
# knn_index, prompts, and eval are reused, so reference/knn_fewshot can be
# compared across providers as a loop check. The thesis base model is the
# open-source Qwen2.5-7B-Instruct (configs/base_qwen.yaml); numbers from this
# commercial-API config are pipeline-validation artifacts, never results.
#
# Runs on data/splits/val.jsonl. test.jsonl stays sealed for final eval.
#
# Cost note: claude-opus-4-8 is the most capable model but is far pricier than
# gpt-4o-mini ($5/$25 vs $0.15/$0.60 per 1M tokens). For cheap prompt iteration,
# switch `model` to claude-haiku-4-5 ($1/$5) or claude-sonnet-4-6 ($3/$15).

# --- Generation (Anthropic messages API) ---
generator:
  provider: anthropic
  model: claude-opus-4-8    # swap to claude-haiku-4-5 / claude-sonnet-4-6 for cheaper runs
  max_tokens: 1024
  thinking: false           # adaptive thinking off; output-only prompt keeps responses clean
  # No temperature/top_p/seed: removed on Opus 4.x / Fable 5 (they return a 400).

# --- Prompting ---
prompt:
  style_instruction_file: prompts/style_instruction.txt

# --- Retrieval (knn_fewshot baseline) ---
retrieval:
  embed_model: intfloat/multilingual-e5-large-instruct
  index_dir: data/knn_index
  train_file: data/splits/train.jsonl
  k: 4

# --- Data ---
# Tuning and smoke runs use the DEV split. test.jsonl is sealed for final eval.
data:
  eval_file: data/splits/val.jsonl
  limit: 25

# --- Output ---
output:
  dir: outputs
